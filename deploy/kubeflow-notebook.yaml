apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kubecode-workspace
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: kubecode
spec:
  template:
    spec:
      containers:
        - name: kubecode
          image: ghcr.io/example/kubecode:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
              name: http
          env:
            - name: NB_PREFIX
              value: /notebook/default/kubecode
            - name: PERSISTENT_DIR
              value: /home/jovyan/srv
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: workspace
              mountPath: /home/jovyan/srv
      securityContext:
        fsGroup: 0
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: kubecode-workspace
