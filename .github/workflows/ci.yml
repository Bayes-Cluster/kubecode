name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm docs:check
      - run: npx tsc --noEmit
      - run: pnpm build
      - run: pnpm test:coverage

  server:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - name: Install ACP adapter dependencies
        run: pnpm install --prod --frozen-lockfile --ignore-scripts
      - name: Verify ACP adapters
        run: |
          test -x packaging/adapter-runtime/node_modules/.bin/claude-agent-acp
          test -x packaging/adapter-runtime/node_modules/.bin/codex-acp
      - run: cargo fmt --manifest-path server/Cargo.toml -- --check
      - run: cargo clippy --locked --manifest-path server/Cargo.toml -- -D warnings
      - run: cargo test --locked --manifest-path server/Cargo.toml

  smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - run: pnpm install --frozen-lockfile
      - name: Build frontend
        run: pnpm build
      - name: Build server
        run: cargo build --locked --manifest-path server/Cargo.toml
      - run: pnpm exec playwright install --with-deps chromium
      - name: Run browser smoke test
        run: pnpm playwright:smoke
        env:
          KUBECODE_SERVER_BIN: ${{ github.workspace }}/server/target/debug/kubecode-server

  standalone:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version-file: packaging/NODE_VERSION
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: cargo build --locked --release --manifest-path server/Cargo.toml --target x86_64-unknown-linux-musl --config 'target.x86_64-unknown-linux-musl.linker="musl-gcc"'
      - name: Assemble standalone release
        run: |
          node_bin="$(node -p 'process.execPath')"
          node_license="$(node -p 'require("node:path").resolve(process.execPath, "../../LICENSE")')"
          scripts/build-standalone.sh \
            --version "$(node -p 'require("./package.json").version')" \
            --arch amd64 \
            --server-bin server/target/x86_64-unknown-linux-musl/release/kubecode-server \
            --node-bin "$node_bin" \
            --node-license "$node_license"
      - name: Smoke standalone release
        run: scripts/smoke-standalone.sh release/kubecode-*-linux-amd64.tar.gz
